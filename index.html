<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBABAG - GBA Box Art Generator</title>
<style>
  :root {
    --primary: #4a90e2;
    --primary-dark: #3a80d2;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #333;
    --border: #dee2e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: var(--bg); 
    color: var(--text);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 600px;
    background: var(--card-bg);
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; }

  /* Upload */
  .drop-zone {
    border: 2px dashed #cbd5e0;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    background: #fdfdfd;
    transition: all 0.2s;
    margin-bottom: 24px;
  }
  .drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }
  .drop-zone p { color: #718096; font-size: 14px; margin-top: 10px; }
  .icon-upload { font-size: 40px; margin-bottom: 8px; display: block; }

  /* Option */
  .section { margin-bottom: 24px; animation: fadeIn 0.4s ease-out; }
  .section-label { font-size: 13px; font-weight: 600; color: #450bc5; margin-bottom: 12px; display: block; }

  .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .btn {
    padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;
    font-weight: 500;
  }
  .btn.active { 
    background: var(--primary); 
    color: #fff; 
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
  }

  /* Preview */
  #preview-wrap {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #eee;
    line-height: 0;
  }
  #preview-canvas { width: 100%; height: auto; display: block; }

  .actions { margin-top: 16px; }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--primary-dark); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <h2>GBA Box Art Generator</h2>

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <span class="icon-upload">🖼️</span>
    <p><strong>Drag into here</strong> or <strong>Click</strong> to upload.</p>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

  <div id="fit-section" class="section" style="display:none;">
    <span class="section-label">Aspect Ratio</span>
    <div class="btn-row">
      <button class="btn active" id="btn-crop" onclick="setFit('crop', this)">Crop</button>
      <button class="btn" id="btn-stretch" onclick="setFit('stretch', this)">Stretch</button>
      <button class="btn" id="btn-contain" onclick="setFit('contain', this)">Fit</button>
    </div>
  </div>

  <div id="preview-section" class="section" style="display:none;">
    <span class="section-label">Preview</span>
    <div id="preview-wrap">
      <canvas id="preview-canvas"></canvas>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadResult()">DOWNLOAD</button>
    </div>
  </div>
</div>

kp42mw1VdUtVXdJ1nmrBT/Tx42dqh/WN18uPXV2rNXIZiDxfyPqqarqrAgAAAAAAAAB4IaL/B8rK6U4U233wAAAAAElFTkSuQmCC";

let userImg = null;
let overlayImg = null;
let fitMode = 'crop';

// Load overlay image
const ov = new Image();
ov.onload = () => { overlayImg = ov; if (userImg) renderCanvas(); };
ov.src = GBA_DATA;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      userImg = img;
      const sq = Math.abs(img.width - img.height) / Math.max(img.width, img.height) < 0.05;
      document.getElementById('fit-section').style.display = sq ? 'none' : 'block';
      document.getElementById('preview-section').style.display = 'block';
      renderCanvas();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function setFit(mode, targetElement) {
  fitMode = mode;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  
  if (targetElement) {
    targetElement.classList.add('active');
  } else {
    const btn = document.getElementById('btn-' + mode);
    if (btn) btn.classList.add('active');
  }
  renderCanvas();
}

function renderCanvas() {
  const canvas = document.getElementById('preview-canvas');
  const W = overlayImg ? overlayImg.width : 512;
  const H = overlayImg ? overlayImg.height : 512;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (userImg) {
    if (fitMode === 'crop') {
      const scale = Math.max(W / userImg.width, H / userImg.height);
      const sw = W / scale, sh = H / scale;
      const sx = (userImg.width - sw) / 2, sy = (userImg.height - sh) / 2;
      ctx.drawImage(userImg, sx, sy, sw, sh, 0, 0, W, H);
    } else if (fitMode === 'stretch') {
      ctx.drawImage(userImg, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
      const scale = Math.min(W / userImg.width, H / userImg.height);
      const dw = userImg.width * scale, dh = userImg.height * scale;
      ctx.drawImage(userImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
    }
  }

  if (overlayImg) ctx.drawImage(overlayImg, 0, 0, W, H);
}

function downloadResult() {
  const canvas = document.getElementById('preview-canvas');
  const a = document.createElement('a');
  a.download = 'gba_composite.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function resetAll() {
  userImg = null;
  document.getElementById('file-input').value = '';
  document.getElementById('fit-section').style.display = 'none';
  document.getElementById('preview-section').style.display = 'none';
}
</script>
